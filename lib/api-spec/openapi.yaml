openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: profile
    description: User fitness profile operations
  - name: checkins
    description: Daily check-in operations
  - name: workouts
    description: External workout logging
  - name: exercises
    description: Exercise library and workout history
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the returnTo path on success or /api/login on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
  /profile:
    get:
      tags: [profile]
      operationId: getUserProfile
      summary: Get the current user's fitness profile
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: User profile retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Unauthorized.
    put:
      tags: [profile]
      operationId: updateUserProfile
      summary: Create or update the current user's fitness profile
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserProfileRequest'
      responses:
        '200':
          description: Profile updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Unauthorized.
  /checkins:
    post:
      tags: [checkins]
      operationId: createDailyCheckIn
      summary: Create or update today's daily check-in
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCheckInRequest'
      responses:
        '200':
          description: Check-in saved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyCheckIn'
        '400':
          description: Missing required fields.
        '401':
          description: Unauthorized.
  /checkins/today:
    get:
      tags: [checkins]
      operationId: getTodayCheckIn
      summary: Get today's check-in for the current user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Today's check-in or null.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/DailyCheckIn'
                  - type: 'null'
        '401':
          description: Unauthorized.
  /workouts/external:
    post:
      tags: [workouts]
      operationId: logExternalWorkout
      summary: Log an external workout (manual or screenshot)
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExternalWorkoutRequest'
      responses:
        '200':
          description: Workout logged.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalWorkout'
        '400':
          description: Missing required fields.
        '401':
          description: Unauthorized.
  /exercises:
    get:
      tags: [exercises]
      operationId: getExercises
      summary: Get filtered exercise library
      parameters:
        - name: muscle_group
          in: query
          required: false
          schema:
            type: string
        - name: equipment
          in: query
          required: false
          schema:
            type: string
        - name: goal
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: List of exercises.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Exercise'
  /exercises/{id}:
    get:
      tags: [exercises]
      operationId: getExerciseById
      summary: Get a single exercise with alternatives resolved
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Exercise with alternatives.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExerciseDetail'
        '404':
          description: Exercise not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /exercises/{id}/history:
    get:
      tags: [exercises]
      operationId: getExerciseHistory
      summary: Get last 3 sessions of an exercise for the authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Exercise history with computed analytics.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExerciseHistoryResponse'
        '401':
          description: Unauthorized.
    post:
      tags: [exercises]
      operationId: logExerciseSet
      summary: Log a set for an exercise
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogExerciseSetRequest'
      responses:
        '200':
          description: Set logged.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutHistoryEntry'
        '401':
          description: Unauthorized.
components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      schema:
        type: string
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AuthUser:
      type: object
      required: [id]
      properties:
        id:
          type: string
        email:
          type: string
          nullable: true
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        profileImageUrl:
          type: string
          nullable: true
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          nullable: true
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
    UserProfile:
      type: object
      required: [userId]
      properties:
        userId:
          type: string
        streakDays:
          type: integer
          nullable: true
        fitnessGoal:
          type: string
          nullable: true
        workoutFrequency:
          type: integer
          nullable: true
        dailySyncProgress:
          type: integer
          nullable: true
        checkInCompleted:
          type: boolean
          nullable: true
        activityImported:
          type: boolean
          nullable: true
        equipment:
          type: array
          items:
            type: string
          nullable: true
        skillLevel:
          type: string
          nullable: true
        injuries:
          type: array
          items:
            type: string
          nullable: true
        onboardingCompleted:
          type: boolean
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
    UpdateUserProfileRequest:
      type: object
      properties:
        streakDays:
          type: integer
          nullable: true
        fitnessGoal:
          type: string
          nullable: true
        workoutFrequency:
          type: integer
          nullable: true
        dailySyncProgress:
          type: integer
          nullable: true
        checkInCompleted:
          type: boolean
          nullable: true
        activityImported:
          type: boolean
          nullable: true
        equipment:
          type: array
          items:
            type: string
          nullable: true
        skillLevel:
          type: string
          nullable: true
        injuries:
          type: array
          items:
            type: string
          nullable: true
        onboardingCompleted:
          type: boolean
          nullable: true
    CreateCheckInRequest:
      type: object
      required: [energyLevel, sleepQuality, stressLevel, sorenessScore]
      properties:
        energyLevel:
          type: integer
          minimum: 1
          maximum: 5
        sleepQuality:
          type: integer
          minimum: 1
          maximum: 5
        stressLevel:
          type: integer
          minimum: 1
          maximum: 5
        sorenessScore:
          type: integer
          minimum: 1
          maximum: 5
        soreMuscleGroups:
          type: array
          items:
            type: string
        notes:
          type: string
          nullable: true
    DailyCheckIn:
      type: object
      required: [id, userId, date, energyLevel, sleepQuality, stressLevel, sorenessScore]
      properties:
        id:
          type: integer
        userId:
          type: string
        date:
          type: string
        energyLevel:
          type: integer
        sleepQuality:
          type: integer
        stressLevel:
          type: integer
        sorenessScore:
          type: integer
        soreMuscleGroups:
          type: array
          items:
            type: string
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    CreateExternalWorkoutRequest:
      type: object
      required: [label, duration, workoutType]
      properties:
        label:
          type: string
        duration:
          type: integer
        workoutType:
          type: string
        source:
          type: string
    ExternalWorkout:
      type: object
      required: [id, userId, label, duration, workoutType]
      properties:
        id:
          type: integer
        userId:
          type: string
        label:
          type: string
        duration:
          type: integer
        workoutType:
          type: string
        source:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    Exercise:
      type: object
      required: [id, name, muscleGroup, equipment, goal, difficulty]
      properties:
        id:
          type: integer
        name:
          type: string
        muscleGroup:
          type: string
        equipment:
          type: string
        goal:
          type: string
        difficulty:
          type: string
        youtubeUrl:
          type: string
          nullable: true
        primaryMuscles:
          type: array
          items:
            type: string
        secondaryMuscles:
          type: array
          items:
            type: string
        tertiaryMuscles:
          type: array
          items:
            type: string
    ExerciseDetail:
      type: object
      required: [id, name, muscleGroup, equipment, goal, difficulty, instructions, commonMistakes, primaryMuscles, secondaryMuscles, tertiaryMuscles, alternatives]
      properties:
        id:
          type: integer
        name:
          type: string
        muscleGroup:
          type: string
        equipment:
          type: string
        goal:
          type: string
        difficulty:
          type: string
        youtubeUrl:
          type: string
          nullable: true
        instructions:
          type: array
          items:
            type: string
        commonMistakes:
          type: array
          items:
            type: string
        primaryMuscles:
          type: array
          items:
            type: string
        secondaryMuscles:
          type: array
          items:
            type: string
        tertiaryMuscles:
          type: array
          items:
            type: string
        alternatives:
          type: array
          items:
            $ref: '#/components/schemas/Exercise'
    WorkoutHistoryEntry:
      type: object
      required: [id, userId, exerciseId, weight, reps, sets, performedAt]
      properties:
        id:
          type: integer
        userId:
          type: string
        exerciseId:
          type: integer
        weight:
          type: integer
        reps:
          type: integer
        sets:
          type: integer
        performedAt:
          type: string
          format: date-time
    SessionVolume:
      type: object
      required: [performedAt, totalVolume, weight, reps, sets]
      properties:
        performedAt:
          type: string
          format: date-time
        totalVolume:
          type: integer
        weight:
          type: integer
        reps:
          type: integer
        sets:
          type: integer
    ExerciseHistoryResponse:
      type: object
      required: [sessions, estimated1RM, isPlateaued]
      properties:
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/SessionVolume'
        estimated1RM:
          type: number
          nullable: true
        isPlateaued:
          type: boolean
        restRecommendation:
          type: string
          nullable: true
    LogExerciseSetRequest:
      type: object
      required: [weight, reps, sets]
      properties:
        weight:
          type: integer
        reps:
          type: integer
        sets:
          type: integer
